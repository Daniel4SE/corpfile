<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 80" width="340" height="80">
  <!-- Icon: folder with shield -->
  <g transform="translate(0, 4)">
    <!-- Folder tab -->
    <rect x="4" y="6" width="28" height="14" rx="4" fill="#206570" opacity="0.6"/>
    <!-- Main folder body -->
    <rect x="4" y="14" width="56" height="44" rx="6" fill="#206570"/>
    <!-- Shield outline -->
    <path d="M32 28 L40 31 L40 41 Q40 46 32 49 Q24 46 24 41 L24 31 Z" fill="none" stroke="rgba(255,255,255,0.75)" stroke-width="1.5"/>
    <!-- Check mark -->
    <polyline points="27,39 31,43 37,35" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark: CorpFile as one word, single color -->
  <text x="74" y="46" font-family="'Arial', 'Helvetica Neue', sans-serif" font-size="36" font-weight="700" fill="#206570" letter-spacing="-0.5">CorpFile</text>

  <!-- Tagline -->
  <text x="75" y="62" font-family="'Arial', 'Helvetica Neue', sans-serif" font-size="9.5" fill="#206570" opacity="0.6" letter-spacing="2.5">CORPORATE SECRETARY SYSTEM</text>
</svg>
