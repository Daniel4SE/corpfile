services:
  - type: web
    name: corpfile
    runtime: docker
    repo: https://github.com/Daniel4SE/corpfile.git
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /welcome
    plan: starter
    autoDeploy: true
    envVars:
      - key: PORT
        value: 10000
      - key: APP_BASE_URL
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 3306
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: DB_NAME
        sync: false
      - key: AI_API_KEY
        sync: false
      - key: AI_MODEL
        value: claude-opus-4-6
      - key: BROWSER_SERVICE_URL
        fromService:
          name: corpfile-browser
          type: pserv
          property: host
      - key: BROWSER_SERVICE_KEY
        sync: false

  - type: pserv
    name: corpfile-browser
    runtime: docker
    repo: https://github.com/Daniel4SE/corpfile.git
    dockerfilePath: ./browser-service/Dockerfile
    dockerContext: ./browser-service
    plan: starter
    autoDeploy: true
    envVars:
      - key: BROWSER_SERVICE_PORT
        value: 3100
      - key: BROWSER_SERVICE_KEY
        sync: false
      - key: MAX_CONCURRENT
        value: 3
      - key: ACTION_TIMEOUT
        value: 30000
